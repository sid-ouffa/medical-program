<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programme Médecine</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1f2937;
    --text: #f1f5f9;
    --muted: #6b7280;
    --accent: #60a5fa;
    --accent2: #a78bfa;
    --green: #4ade80;
    --done-bg: rgba(74,222,128,0.07);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    padding: 0 0 5rem;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  /* HEADER */
  .app-header {
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 1rem 1rem;
    position: sticky; top: 0; z-index: 100;
  }
  .app-header-inner {
    max-width: 720px; margin: 0 auto;
  }
  .label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 0.3rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: var(--text); line-height: 1.1;
    margin-bottom: 1rem;
  }
  .global-progress { display: flex; align-items: center; gap: 1rem; }
  .progress-track {
    flex: 1; height: 5px;
    background: var(--border); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .progress-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; color: var(--accent);
    white-space: nowrap; min-width: 5rem; text-align: right;
  }

  /* CONTENT */
  .content { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; position: relative; z-index: 1; }

  /* MODULE */
  .module { margin-bottom: 1.2rem; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .module-header {
    display: flex; align-items: center; gap: 1rem;
    padding: 1rem 1.2rem;
    background: var(--surface);
    cursor: pointer;
    user-select: none;
    transition: background 0.2s;
  }
  .module-header:hover { background: #161d2e; }
  .module-icon { font-size: 1.3rem; flex-shrink: 0; }
  .module-info { flex: 1; }
  .module-name {
    font-weight: 600; font-size: 0.95rem; color: var(--text);
    margin-bottom: 0.2rem;
  }
  .module-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; color: var(--muted);
  }
  .module-mini-bar {
    width: 60px; height: 4px;
    background: var(--border); border-radius: 999px; overflow: hidden;
    flex-shrink: 0;
  }
  .module-mini-fill {
    height: 100%;
    background: linear-gradient(90deg, #60a5fa, #a78bfa);
    border-radius: 999px;
    transition: width 0.4s;
  }
  .module-chevron {
    color: var(--muted); font-size: 0.8rem; flex-shrink: 0;
    transition: transform 0.3s;
  }
  .module.open .module-chevron { transform: rotate(180deg); }

  /* ITEMS */
  .module-items { display: none; background: var(--bg); border-top: 1px solid var(--border); }
  .module.open .module-items { display: block; }

  .course-item {
    display: flex; align-items: center; gap: 0.9rem;
    padding: 0.75rem 1.2rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    user-select: none;
  }
  .course-item:last-child { border-bottom: none; }
  .course-item:hover { background: rgba(255,255,255,0.02); }
  .course-item.done { background: var(--done-bg); }

  .course-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .tag-anatomy   { background: rgba(251,146,60,0.15); color: #fb923c; }
  .tag-physio    { background: rgba(96,165,250,0.15); color: #60a5fa; }
  .tag-semio     { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .tag-physiopath { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .tag-patho     { background: rgba(248,113,113,0.15); color: #f87171; }
  .tag-pharma    { background: rgba(74,222,128,0.15); color: #4ade80; }
  .tag-micro     { background: rgba(34,211,238,0.15); color: #22d3ee; }
  .tag-base      { background: rgba(148,163,184,0.15); color: #94a3b8; }

  .course-text {
    flex: 1; font-size: 0.88rem; color: var(--text); line-height: 1.4;
  }
  .course-item.done .course-text {
    color: var(--muted);
    text-decoration: line-through;
    text-decoration-color: rgba(74,222,128,0.4);
  }
  .check-btn {
    width: 24px; height: 24px; border-radius: 50%;
    border: 2px solid var(--border);
    background: transparent; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, background 0.2s;
  }
  .course-item:hover .check-btn { border-color: var(--green); }
  .course-item.done .check-btn { background: var(--green); border-color: var(--green); }
  .check-btn::after { content: '✓'; font-size: 0.7rem; font-weight: 700; color: transparent; }
  .course-item.done .check-btn::after { color: #0a0e1a; }

  /* FILTER TABS */
  .filter-wrap {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 1.2rem;
  }
  .filter-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.35rem 0.8rem;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent; color: var(--muted);
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    border-color: var(--accent); color: var(--accent);
    background: rgba(96,165,250,0.08);
  }

  /* RESET */
  .reset-btn {
    display: block; margin: 2rem auto 0;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.1em;
    padding: 0.5rem 1.2rem; border-radius: 6px;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .reset-btn:hover { border-color: #f87171; color: #f87171; }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-header-inner">
    <p class="label">4ème Année Médecine</p>
    <h1>Programme d'Étude</h1>
    <div class="global-progress">
      <div class="progress-track"><div class="progress-fill" id="globalFill"></div></div>
      <span class="progress-text" id="globalText">0 / 0</span>
    </div>
  </div>
</div>

<div class="content">
  <div class="filter-wrap" id="filterWrap"></div>
  <div id="moduleList"></div>
  <button class="reset-btn" onclick="resetAll()">↺ Réinitialiser tout</button>
</div>

<script>
const modules = [
  // ══════════════ BASES ══════════════
  {
    id: "semio", icon: "🔍", name: "Sémiologie Générale", phase: "Bases",
    items: [
      { id:"s1", tag:"semio", text:"L'interrogatoire — anamnèse, motif, histoire de la maladie" },
      { id:"s2", tag:"semio", text:"Les signes fonctionnels — douleur, fièvre, asthénie" },
      { id:"s3", tag:"semio", text:"L'examen physique général — inspection, palpation, percussion, auscultation" },
      { id:"s4", tag:"semio", text:"Les constantes vitales — PA, FC, FR, température, SpO2" },
      { id:"s5", tag:"semio", text:"Rédiger une observation médicale complète" },
      { id:"s6", tag:"semio", text:"Comment présenter un dossier clinique" },
    ]
  },
  {
    id: "anatgen", icon: "🦴", name: "Anatomie Clinique Essentielle", phase: "Bases",
    items: [
      { id:"a1", tag:"anatomy", text:"Anatomie du thorax — repères et projections" },
      { id:"a2", tag:"anatomy", text:"Anatomie de l'abdomen — régions et organes" },
      { id:"a3", tag:"anatomy", text:"Anatomie du cœur — cavités, valves, vascularisation" },
      { id:"a4", tag:"anatomy", text:"Anatomie des poumons et plèvre" },
      { id:"a5", tag:"anatomy", text:"Anatomie du système nerveux central — bases" },
      { id:"a6", tag:"anatomy", text:"Anatomie des membres — axes vasculaires principaux" },
    ]
  },
  {
    id: "physgen", icon: "⚡", name: "Physiologie Essentielle", phase: "Bases",
    items: [
      { id:"p1", tag:"physio", text:"Physiologie cellulaire — potentiel d'action, transport membranaire" },
      { id:"p2", tag:"physio", text:"Physiologie cardiovasculaire — cycle cardiaque, débit" },
      { id:"p3", tag:"physio", text:"Physiologie respiratoire — ventilation, échanges gazeux" },
      { id:"p4", tag:"physio", text:"Physiologie rénale — filtration, réabsorption, homéostasie" },
      { id:"p5", tag:"physio", text:"Équilibre acido-basique et ionogramme" },
      { id:"p6", tag:"physio", text:"Physiologie du système nerveux autonome" },
    ]
  },
  {
    id: "micro", icon: "🦠", name: "Microbiologie / Immunologie de Base", phase: "Bases",
    items: [
      { id:"m1", tag:"micro", text:"Bactéries — classification, gram+, gram-, anaérobies" },
      { id:"m2", tag:"micro", text:"Virus — structure, modes de réplication" },
      { id:"m3", tag:"micro", text:"Immunité innée vs adaptative" },
      { id:"m4", tag:"micro", text:"Les antibiotiques — familles, mechanisms, résistances" },
      { id:"m5", tag:"micro", text:"Infections nosocomiales et hygiène hospitalière" },
    ]
  },
  {
    id: "pharmabase", icon: "💊", name: "Pharmacologie de Base", phase: "Bases",
    items: [
      { id:"ph1", tag:"pharma", text:"Pharmacocinétique — absorption, distribution, métabolisme, élimination" },
      { id:"ph2", tag:"pharma", text:"Pharmacodynamie — récepteurs, agonistes, antagonistes" },
      { id:"ph3", tag:"pharma", text:"Effets indésirables et interactions médicamenteuses" },
      { id:"ph4", tag:"pharma", text:"Les antalgiques — paliers OMS, AINS, morphiniques" },
      { id:"ph5", tag:"pharma", text:"Les antibiotiques en pratique — indications courantes" },
    ]
  },

  // ══════════════ CETTE ANNÉE ══════════════
  {
    id: "cardio", icon: "❤️", name: "Cardiologie", phase: "4ème Année",
    items: [
      { id:"c1", tag:"anatomy", text:"Anatomie du cœur et des gros vaisseaux" },
      { id:"c2", tag:"physio", text:"Physiologie cardiaque — automatisme, conduction, cycle" },
      { id:"c3", tag:"semio", text:"Sémiologie cardiaque — douleur thoracique, dyspnée, œdèmes, souffle" },
      { id:"c4", tag:"physiopath", text:"Physiopathologie de l'insuffisance cardiaque" },
      { id:"c5", tag:"patho", text:"Insuffisance cardiaque — gauche, droite, globale" },
      { id:"c6", tag:"patho", text:"Syndrome coronarien aigu — angor, IDM" },
      { id:"c7", tag:"patho", text:"Hypertension artérielle — définition, complications, traitement" },
      { id:"c8", tag:"patho", text:"Troubles du rythme — FA, tachycardies, bradycardies" },
      { id:"c9", tag:"patho", text:"Valvulopathies — RM, IM, RA, IA" },
      { id:"c10", tag:"patho", text:"Péricardite et myocardite" },
      { id:"c11", tag:"base", text:"ECG — lecture systématique" },
      { id:"c12", tag:"pharma", text:"Médicaments cardiaques — IEC, bêtabloquants, diurétiques, digoxine" },
    ]
  },
  {
    id: "pneumo", icon: "🫁", name: "Pneumologie", phase: "4ème Année",
    items: [
      { id:"pn1", tag:"anatomy", text:"Anatomie des poumons, bronches et plèvre" },
      { id:"pn2", tag:"physio", text:"Physiologie respiratoire — EFR, volumes, débits" },
      { id:"pn3", tag:"semio", text:"Sémiologie respiratoire — toux, dyspnée, expectoration, hémoptysie" },
      { id:"pn4", tag:"semio", text:"Sémiologie physique — syndrome de condensation, épanchement, cavité" },
      { id:"pn5", tag:"patho", text:"Pneumonie communautaire et HAP" },
      { id:"pn6", tag:"patho", text:"Asthme — diagnostic, classification, traitement" },
      { id:"pn7", tag:"patho", text:"BPCO — définition, stades, prise en charge" },
      { id:"pn8", tag:"patho", text:"Tuberculose pulmonaire" },
      { id:"pn9", tag:"patho", text:"Épanchement pleural — transsudat vs exsudat" },
      { id:"pn10", tag:"patho", text:"Embolie pulmonaire" },
      { id:"pn11", tag:"patho", text:"Cancer broncho-pulmonaire — bases" },
      { id:"pn12", tag:"base", text:"Lecture d'une radiographie thoracique" },
    ]
  },
  {
    id: "infectio", icon: "🦠", name: "Infectiologie", phase: "4ème Année",
    items: [
      { id:"i1", tag:"semio", text:"Syndrome infectieux — fièvre, frissons, AEG" },
      { id:"i2", tag:"physiopath", text:"Physiopathologie de la sepsis et choc septique" },
      { id:"i3", tag:"patho", text:"Méningites bactériennes et virales" },
      { id:"i4", tag:"patho", text:"Endocardite infectieuse" },
      { id:"i5", tag:"patho", text:"Infections urinaires — cystite, pyélonéphrite, prostatite" },
      { id:"i6", tag:"patho", text:"Infections respiratoires — pneumonie, bronchite, grippe" },
      { id:"i7", tag:"patho", text:"Paludisme — diagnostic et traitement" },
      { id:"i8", tag:"patho", text:"Typhoïde — tableau clinique et prise en charge" },
      { id:"i9", tag:"patho", text:"VIH / SIDA — bases cliniques" },
      { id:"i10", tag:"pharma", text:"Antibiothérapie probabiliste selon le foyer infectieux" },
    ]
  },
  {
    id: "neuro", icon: "🧠", name: "Neurologie", phase: "4ème Année",
    items: [
      { id:"n1", tag:"anatomy", text:"Anatomie du système nerveux central — cerveau, tronc, moelle" },
      { id:"n2", tag:"anatomy", text:"Anatomie des nerfs crâniens — 12 paires" },
      { id:"n3", tag:"semio", text:"Examen neurologique complet — motricité, sensibilité, réflexes, paires crâniennes" },
      { id:"n4", tag:"semio", text:"Syndrome pyramidal vs syndrome extrapyramidal" },
      { id:"n5", tag:"semio", text:"Syndrome cérébelleux, méningé, confusionnel" },
      { id:"n6", tag:"patho", text:"AVC ischémique et hémorragique" },
      { id:"n7", tag:"patho", text:"Épilepsie — classification et traitement" },
      { id:"n8", tag:"patho", text:"Maladie de Parkinson" },
      { id:"n9", tag:"patho", text:"Sclérose en plaques — bases" },
      { id:"n10", tag:"patho", text:"Céphalées — migraine, algie vasculaire, céphalée de tension" },
      { id:"n11", tag:"patho", text:"Polyradiculonévrite — Guillain-Barré" },
      { id:"n12", tag:"base", text:"Lecture d'un scanner et IRM cérébrale — bases" },
    ]
  },
  {
    id: "hemato", icon: "🩸", name: "Hématologie", phase: "4ème Année",
    items: [
      { id:"h1", tag:"physio", text:"Hématopoïèse — formation des cellules sanguines" },
      { id:"h2", tag:"semio", text:"Sémiologie hématologique — pâleur, ictère, splénomégalie, adénopathies" },
      { id:"h3", tag:"base", text:"Lire une NFS — interpréter les anomalies" },
      { id:"h4", tag:"physiopath", text:"Physiopathologie des anémies" },
      { id:"h5", tag:"patho", text:"Anémies — ferriprive, hémolytique, mégaloblastique" },
      { id:"h6", tag:"patho", text:"Leucémies aiguës — bases cliniques" },
      { id:"h7", tag:"patho", text:"Lymphomes — Hodgkin et non-Hodgkin" },
      { id:"h8", tag:"patho", text:"Troubles de l'hémostase — thrombopénie, CIVD, hémophilie" },
      { id:"h9", tag:"patho", text:"Drépanocytose et thalassémie" },
      { id:"h10", tag:"pharma", text:"Anticoagulants et antiagrégants — indications et surveillance" },
    ]
  },
];

// ── STATE ──
function loadState() { try { return JSON.parse(localStorage.getItem('med_prog') || '{}'); } catch { return {}; } }
function saveState(s) { try { localStorage.setItem('med_prog', JSON.stringify(s)); } catch {} }
let state = loadState();

// open modules
function loadOpen() { try { return JSON.parse(localStorage.getItem('med_open') || '[]'); } catch { return []; } }
function saveOpen(o) { try { localStorage.setItem('med_open', JSON.stringify(o)); } catch {} }
let openModules = loadOpen();

let activeFilter = 'Tous';

// ── RENDER ──
function render() {
  const list = document.getElementById('moduleList');
  list.innerHTML = '';
  let total = 0, done = 0;

  const phases = ['Tous', 'Bases', '4ème Année'];
  const filterWrap = document.getElementById('filterWrap');
  filterWrap.innerHTML = '';
  phases.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (activeFilter === p ? ' active' : '');
    btn.textContent = p;
    btn.onclick = () => { activeFilter = p; render(); };
    filterWrap.appendChild(btn);
  });

  modules.forEach(mod => {
    if (activeFilter !== 'Tous' && mod.phase !== activeFilter) return;

    const modDone = mod.items.filter(it => !!state[it.id]).length;
    const modTotal = mod.items.length;
    total += modTotal; done += modDone;
    const pct = modTotal ? Math.round((modDone / modTotal) * 100) : 0;
    const isOpen = openModules.includes(mod.id);

    const el = document.createElement('div');
    el.className = 'module' + (isOpen ? ' open' : '');

    el.innerHTML = `
      <div class="module-header" onclick="toggleModule('${mod.id}')">
        <span class="module-icon">${mod.icon}</span>
        <div class="module-info">
          <div class="module-name">${mod.name}</div>
          <div class="module-sub">${mod.phase} · ${modDone}/${modTotal} cours</div>
        </div>
        <div class="module-mini-bar"><div class="module-mini-fill" style="width:${pct}%"></div></div>
        <span class="module-chevron">▼</span>
      </div>
      <div class="module-items" id="items-${mod.id}"></div>
    `;

    const itemsEl = el.querySelector(`#items-${mod.id}`);
    mod.items.forEach(item => {
      const isDone = !!state[item.id];
      const row = document.createElement('div');
      row.className = 'course-item' + (isDone ? ' done' : '');
      row.onclick = () => toggleItem(item.id);
      row.innerHTML = `
        <span class="course-tag tag-${item.tag}">${item.tag}</span>
        <span class="course-text">${item.text}</span>
        <div class="check-btn"></div>
      `;
      itemsEl.appendChild(row);
    });

    list.appendChild(el);
  });

  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('globalFill').style.width = pct + '%';
  document.getElementById('globalText').textContent = `${done} / ${total} cours`;
}

function toggleModule(id) {
  if (openModules.includes(id)) openModules = openModules.filter(x => x !== id);
  else openModules.push(id);
  saveOpen(openModules);
  render();
}

function toggleItem(id) {
  state[id] = !state[id];
  saveState(state);
  render();
}

function resetAll() {
  if (confirm('Réinitialiser toute la progression ?')) {
    state = {}; saveState(state); render();
  }
}

render();
</script>
</body>
</html>
